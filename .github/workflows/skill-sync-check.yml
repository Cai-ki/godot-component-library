name: Docs And Skill Checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify .claude and .agents skill sync
        run: tools/sync_godot_skill.sh check

      - name: Verify docs consistency
        run: tools/docs_consistency_check.sh
